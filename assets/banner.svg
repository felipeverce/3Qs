<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e3848"/>
      <stop offset="100%" stop-color="#376290"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#74fbfb"/>
      <stop offset="100%" stop-color="#8dd0df"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- decorative grid -->
  <g opacity="0.08" stroke="#74fbfb" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
    <line x1="1000" y1="0" x2="1000" y2="320"/>
  </g>

  <!-- semaphore dots -->
  <circle cx="1060" cy="70" r="16" fill="#ef4444" opacity="0.9"/>
  <circle cx="1100" cy="70" r="16" fill="#facc15" opacity="0.9"/>
  <circle cx="1140" cy="70" r="16" fill="#22c55e" opacity="0.9"/>

  <!-- main title -->
  <text x="80" y="150" font-family="'Inter','Segoe UI','Helvetica Neue',sans-serif" font-size="110" font-weight="900" fill="url(#accent)" filter="url(#glow)">3 Q's</text>
  <text x="80" y="200" font-family="'Inter','Segoe UI','Helvetica Neue',sans-serif" font-size="36" font-weight="700" fill="#F5F6F7">Meta Campaign Analyzer</text>
  <text x="80" y="240" font-family="'Inter','Segoe UI','Helvetica Neue',sans-serif" font-size="20" font-weight="400" fill="#8dd0df">¿Qué pasó?  ·  ¿Por qué pasó?  ·  ¿Qué haremos?</text>

  <!-- accent bar -->
  <rect x="80" y="260" width="120" height="4" rx="2" fill="#74fbfb"/>

  <!-- right side badge -->
  <g transform="translate(920, 180)">
    <rect x="0" y="0" width="220" height="90" rx="12" fill="#2e3848" stroke="#74fbfb" stroke-width="2" opacity="0.9"/>
    <text x="110" y="38" text-anchor="middle" font-family="'Inter',sans-serif" font-size="14" font-weight="600" fill="#8dd0df">POWERED BY</text>
    <text x="110" y="68" text-anchor="middle" font-family="'Inter',sans-serif" font-size="22" font-weight="800" fill="#74fbfb">Meta Marketing API</text>
  </g>
</svg>

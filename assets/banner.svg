<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" width="1600" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2430"/>
      <stop offset="55%" stop-color="#2e3848"/>
      <stop offset="100%" stop-color="#376290"/>
    </linearGradient>

    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#74fbfb"/>
      <stop offset="100%" stop-color="#8dd0df"/>
    </linearGradient>

    <linearGradient id="barGreen" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="barYellow" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#eab308" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
    <linearGradient id="barRed" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#74fbfb" opacity="0.18"/>
    </pattern>

    <clipPath id="bannerClip">
      <rect width="1600" height="400" rx="24"/>
    </clipPath>
  </defs>

  <g clip-path="url(#bannerClip)">
    <!-- Base -->
    <rect width="1600" height="400" fill="url(#bgGrad)"/>

    <!-- Dot pattern overlay -->
    <rect width="1600" height="400" fill="url(#dots)"/>

    <!-- Glowing orbs -->
    <circle cx="1380" cy="90" r="140" fill="#74fbfb" opacity="0.08" filter="url(#softGlow)"/>
    <circle cx="260" cy="340" r="180" fill="#376290" opacity="0.35" filter="url(#softGlow)"/>

    <!-- Abstract line chart path -->
    <path d="M -20,280 Q 140,200 280,240 T 560,180 T 860,220 T 1200,140 T 1620,180"
          stroke="url(#cyanGrad)" stroke-width="2.5" fill="none" opacity="0.35"/>
    <path d="M -20,320 Q 140,260 280,290 T 560,240 T 860,270 T 1200,200 T 1620,230"
          stroke="#8dd0df" stroke-width="1.5" fill="none" opacity="0.2" stroke-dasharray="4,4"/>

    <!-- ============== LEFT SIDE — TITLE ============== -->
    <g transform="translate(90, 110)">
      <!-- eyebrow -->
      <g>
        <rect x="0" y="0" width="44" height="2" fill="#74fbfb"/>
        <text x="58" y="6" font-family="'Inter','Segoe UI',sans-serif" font-size="14" font-weight="700" letter-spacing="4" fill="#74fbfb">
          META · CAMPAIGN · ANALYZER
        </text>
      </g>

      <!-- main logo text -->
      <text x="0" y="130" font-family="'Inter','Segoe UI',sans-serif" font-size="180" font-weight="900" fill="url(#cyanGrad)" filter="url(#softGlow)" letter-spacing="-6">
        3Q<tspan fill="#F5F6F7">'</tspan>s
      </text>

      <!-- subtitle -->
      <text x="6" y="180" font-family="'Inter','Segoe UI',sans-serif" font-size="22" font-weight="500" fill="#F5F6F7" opacity="0.85">
        Diagnostica campañas de Meta con el framework de las 3 Q's
      </text>

      <!-- three questions pill -->
      <g transform="translate(6, 215)">
        <g>
          <rect x="0" y="0" width="168" height="34" rx="17" fill="#2e3848" stroke="#74fbfb" stroke-width="1.2" opacity="0.85"/>
          <circle cx="18" cy="17" r="6" fill="#ef4444"/>
          <text x="32" y="22" font-family="'Inter',sans-serif" font-size="13" font-weight="600" fill="#F5F6F7">¿Qué pasó?</text>
        </g>
        <g transform="translate(180, 0)">
          <rect x="0" y="0" width="188" height="34" rx="17" fill="#2e3848" stroke="#facc15" stroke-width="1.2" opacity="0.85"/>
          <circle cx="18" cy="17" r="6" fill="#facc15"/>
          <text x="32" y="22" font-family="'Inter',sans-serif" font-size="13" font-weight="600" fill="#F5F6F7">¿Por qué pasó?</text>
        </g>
        <g transform="translate(380, 0)">
          <rect x="0" y="0" width="180" height="34" rx="17" fill="#2e3848" stroke="#22c55e" stroke-width="1.2" opacity="0.85"/>
          <circle cx="18" cy="17" r="6" fill="#22c55e"/>
          <text x="32" y="22" font-family="'Inter',sans-serif" font-size="13" font-weight="600" fill="#F5F6F7">¿Qué haremos?</text>
        </g>
      </g>
    </g>

    <!-- ============== RIGHT SIDE — DASHBOARD CARD ============== -->
    <g transform="translate(1050, 70)">
      <!-- card background -->
      <rect x="0" y="0" width="480" height="260" rx="18" fill="#2e3848" fill-opacity="0.75" stroke="#74fbfb" stroke-width="1.2" stroke-opacity="0.4"/>

      <!-- card header -->
      <circle cx="22" cy="26" r="5" fill="#ef4444"/>
      <circle cx="40" cy="26" r="5" fill="#facc15"/>
      <circle cx="58" cy="26" r="5" fill="#22c55e"/>
      <text x="82" y="31" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#8dd0df" opacity="0.8">campaign_insights.json</text>

      <!-- KPI grid -->
      <g transform="translate(24, 58)">
        <!-- ROAS -->
        <g>
          <text x="0" y="14" font-family="'Inter',sans-serif" font-size="11" font-weight="600" fill="#8dd0df" letter-spacing="1.5">ROAS</text>
          <text x="0" y="46" font-family="'Inter',sans-serif" font-size="30" font-weight="800" fill="#74fbfb">4.2x</text>
          <text x="0" y="64" font-family="'Inter',sans-serif" font-size="10" fill="#22c55e">▲ vs objetivo 3x</text>
        </g>
        <!-- CPL -->
        <g transform="translate(150, 0)">
          <text x="0" y="14" font-family="'Inter',sans-serif" font-size="11" font-weight="600" fill="#8dd0df" letter-spacing="1.5">CPL</text>
          <text x="0" y="46" font-family="'Inter',sans-serif" font-size="30" font-weight="800" fill="#facc15">$18</text>
          <text x="0" y="64" font-family="'Inter',sans-serif" font-size="10" fill="#facc15">— cerca del objetivo</text>
        </g>
        <!-- CTR -->
        <g transform="translate(300, 0)">
          <text x="0" y="14" font-family="'Inter',sans-serif" font-size="11" font-weight="600" fill="#8dd0df" letter-spacing="1.5">CTR</text>
          <text x="0" y="46" font-family="'Inter',sans-serif" font-size="30" font-weight="800" fill="#ef4444">0.7%</text>
          <text x="0" y="64" font-family="'Inter',sans-serif" font-size="10" fill="#ef4444">▼ bajo benchmark</text>
        </g>
      </g>

      <!-- mini bar chart -->
      <g transform="translate(24, 170)">
        <text x="0" y="0" font-family="'Inter',sans-serif" font-size="10" font-weight="600" fill="#8dd0df" letter-spacing="1.5" opacity="0.85">EMBUDO · ÚLTIMOS 30 DÍAS</text>
        <g transform="translate(0, 12)">
          <rect x="0"   y="30" width="52" height="40" rx="4" fill="url(#barGreen)"/>
          <rect x="62"  y="18" width="52" height="52" rx="4" fill="url(#barGreen)"/>
          <rect x="124" y="34" width="52" height="36" rx="4" fill="url(#barYellow)"/>
          <rect x="186" y="42" width="52" height="28" rx="4" fill="url(#barYellow)"/>
          <rect x="248" y="50" width="52" height="20" rx="4" fill="url(#barRed)"/>
          <rect x="310" y="56" width="52" height="14" rx="4" fill="url(#barRed)"/>
          <rect x="372" y="62" width="52" height="8"  rx="4" fill="url(#barRed)"/>
        </g>
      </g>
    </g>

    <!-- bottom border accent -->
    <rect x="0" y="396" width="1600" height="4" fill="url(#cyanGrad)"/>
  </g>
</svg>
